name: Deploy to VPS

# Runs on every push to main: builds the site and rsyncs the static
# output to the VPS over SSH. Requires 4 repository secrets to be set
# under Settings → Secrets and variables → Actions (see README-edit.md
# section "Настройка деплоя" for how to get each one):
#
#   SSH_PRIVATE_KEY  — private key matching a public key authorized on the VPS
#   VPS_HOST         — server IP or hostname
#   VPS_USER         — SSH user (e.g. deploy)
#   VPS_PATH         — absolute path nginx serves, e.g. /var/www/anniversary-site

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy over rsync/SSH
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: ${{ secrets.VPS_PATH }}
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
